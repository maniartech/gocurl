name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Competitive benchmarks (resty/req) run weekly, off the PR path, since they
    # pull a heavy vendor graph and the numbers are diagnostic, not a merge gate.
    - cron: '0 6 * * 1'

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23.x', '1.24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^book2/' || true)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race, hermetic)
        run: go test -short -race -timeout 240s ./...

      - name: Coverage (floor 75%)
        run: |
          # -count=1 is REQUIRED: without it, cached packages reuse stale coverage
          # profiles and the -coverpkg merge reports an artificially low, variable
          # total (~76.9% vs the true 80.8%), which can spuriously breach the floor.
          go test -short -count=1 -coverpkg=./... -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9]+\.[0-9]+' | tail -1)
          echo "Total coverage: ${total}%"
          floor=75.0
          if awk "BEGIN{exit !(${total} < ${floor})}"; then
            echo "::error::coverage ${total}% is below the ${floor}% floor"
            exit 1
          fi

      - name: Fuzz smoke (30s per target)
        run: |
          go test -run='^$' -fuzz='FuzzTokenize$' -fuzztime=30s ./tokenizer/
          go test -run='^$' -fuzz='FuzzParseCommand$' -fuzztime=30s .

  benchmarks:
    # Benchmarks run without -race (which perturbs timing/allocs) on a single pinned
    # Go version so numbers stay comparable. This is a SMOKE: every benchmark runs
    # once and must not error. Performance numbers themselves are recorded in
    # docs/benchmarking.md via `-count=10` + benchstat, not gated on time here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Benchmark smoke (no -race, run once)
        run: go test -run='^$' -bench=. -benchmem -benchtime=1x ./...

  competitive-benchmarks:
    # Scheduled only (cron) — never on PRs. Runs the separate benchcmp module's
    # gocurl-vs-net/http-vs-resty-vs-req arms over the shared fair transport and
    # publishes the numbers as a workflow artifact. allocs/B regressions on
    # gocurl's OWN path are gated in the normal test job (TestAllocBudget_Do);
    # this job is the cross-client diagnostic that backs docs/benchmarking.md.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Run competitive arms (count=10)
        working-directory: benchcmp
        run: |
          go test -run='^$' -bench='BenchmarkCmp' -benchmem -count=10 . | tee bench-new.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: competitive-benchmarks
          path: benchcmp/bench-new.txt
