name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.22.x', '1.23.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^book2/' || true)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race, hermetic)
        run: go test -short -race -timeout 240s ./...

      - name: Coverage
        run: go test -short -coverprofile=coverage.out ./... && go tool cover -func=coverage.out | tail -1
